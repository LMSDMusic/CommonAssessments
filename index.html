<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LMSD Common Music Assessments: Tonal</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --cream: #f7f3ec;
    --parchment: #ede7d9;
    --navy: #1a2744;
    --navy-mid: #2c3e6b;
    --gold: #c8973a;
    --gold-light: #e8b84b;
    --green: #2d7a5f;
    --red: #b03a2e;
    --text: #1a1a2e;
    --muted: #6b6b8a;
    /* Ensemble themes */
    --orch-bg:     #f0ecf8;
    --orch-border: #c9bce8;
    --orch-icon:   #6b4faa;
    --orch-hover:  #e6dff5;
    --band-bg:     #fdf4e3;
    --band-border: #e8d099;
    --band-icon:   #a07820;
    --band-hover:  #faefd4;
    /* Instrument colors */
    --violin-color: #a33030;
    --viola-color:  #2a7a6a;
    --cello-color:  #b06a10;
    --bass-color:   #1a5c7a;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background-color: var(--cream);
    background-image: repeating-linear-gradient(transparent, transparent 39px, #c8c0b0 39px, #c8c0b0 40px);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'DM Sans', sans-serif;
    color: var(--text);
    padding: 20px;
  }

  .card {
    background: white;
    border-radius: 16px;
    box-shadow: 0 8px 40px rgba(26,39,68,0.15), 0 2px 8px rgba(26,39,68,0.08);
    max-width: 580px;
    width: 100%;
    overflow: hidden;
    animation: slideUp 0.4s ease;
  }

  @keyframes slideUp {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ── HEADER ── */
  .header {
    background: var(--navy);
    padding: 20px 28px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
  }
  .header h1 {
    font-family: 'Playfair Display', serif;
    color: white;
    font-size: 1.15rem;
    letter-spacing: 0.02em;
    line-height: 1.3;
  }
  .header h1 span {
    display: block;
    font-size: 0.75rem;
    font-family: 'DM Sans', sans-serif;
    font-weight: 400;
    color: rgba(255,255,255,0.55);
    letter-spacing: 0.04em;
    margin-bottom: 2px;
  }
  .header-right { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
  .key-badge {
    background: var(--gold);
    color: var(--navy);
    font-size: 0.72rem;
    font-weight: 600;
    padding: 4px 10px;
    border-radius: 20px;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    white-space: nowrap;
  }
  .back-btn {
    background: rgba(255,255,255,0.15);
    color: white;
    border: none;
    border-radius: 8px;
    padding: 5px 12px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.8rem;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.2s;
    white-space: nowrap;
  }
  .back-btn:hover { background: rgba(255,255,255,0.28); }

  /* ── PROGRESS ── */
  .progress-bar-wrap { background: var(--parchment); height: 6px; }
  .progress-bar {
    height: 100%;
    background: linear-gradient(90deg, var(--gold), var(--gold-light));
    transition: width 0.5s ease;
  }

  /* ── SHARED MENU STYLES ── */
  .menu-body { padding: 32px 28px; animation: slideUp 0.35s ease; }
  .menu-intro {
    font-family: 'Playfair Display', serif;
    font-size: 1.35rem;
    color: var(--navy);
    margin-bottom: 5px;
  }
  .menu-sub { color: var(--muted); font-size: 0.88rem; margin-bottom: 24px; line-height: 1.5; }


  /* ── FOLDER CARDS (home / group screens) ── */
  .folder-cards { display: flex; flex-direction: column; gap: 12px; }
  .folder-card {
    display: flex; align-items: center; gap: 16px;
    background: var(--cream); border: 2px solid var(--parchment);
    border-radius: 14px; padding: 18px 20px;
    cursor: pointer; transition: all 0.2s ease; text-align: left;
  }
  .folder-card:hover {
    border-color: var(--navy); background: white;
    box-shadow: 0 4px 16px rgba(26,39,68,0.12); transform: translateY(-2px);
  }
  .folder-card.orch { background: var(--orch-bg); border-color: var(--orch-border); }
  .folder-card.orch:hover { background: var(--orch-hover); border-color: var(--orch-icon); }
  .folder-card.orch .folder-icon { background: var(--orch-icon); }
  .folder-card.orch .folder-arrow { color: var(--orch-icon); }
  .folder-card.band { background: var(--band-bg); border-color: var(--band-border); }
  .folder-card.band:hover { background: var(--band-hover); border-color: var(--band-icon); }
  .folder-card.band .folder-icon { background: var(--band-icon); }
  .folder-card.band .folder-arrow { color: var(--band-icon); }
  .folder-icon {
    font-size: 1.5rem; width: 50px; height: 50px; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    background: var(--navy); border-radius: 12px;
  }
  .folder-info { flex: 1; }
  .folder-title { font-family: 'Playfair Display', serif; font-size: 1.05rem; color: var(--navy); margin-bottom: 2px; }
  .folder-desc  { font-size: 0.8rem; color: var(--muted); }
  .folder-arrow { color: var(--muted); font-size: 1.4rem; }
  .folder-card:hover .folder-arrow { color: var(--navy); }

  /* ── QUIZ CARDS (instrument level) ── */
  .quiz-cards { display: flex; flex-direction: column; gap: 12px; }
  .quiz-card {
    display: flex; align-items: center; gap: 16px;
    background: var(--cream); border: 2px solid var(--parchment);
    border-radius: 14px; padding: 16px 20px;
    cursor: pointer; transition: all 0.2s ease; text-align: left;
  }
  .quiz-card:hover {
    background: white; box-shadow: 0 4px 16px rgba(26,39,68,0.12); transform: translateY(-2px);
  }
  .quiz-card-icon {
    font-size: 1.6rem; width: 48px; height: 48px; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    background: var(--navy); border-radius: 10px; color: white;
  }
  /* Instrument card: tinted background + border, icon stays navy */
  .quiz-card.violin { background: #f9f0f0; border-color: #d9b0b0; }
  .quiz-card.violin:hover { background: #f4e3e3; border-color: var(--violin-color); }
  .quiz-card.viola  { background: #eef6f5; border-color: #a8cdc8; }
  .quiz-card.viola:hover  { background: #ddf0ed; border-color: var(--viola-color); }
  .quiz-card.cello  { background: #fdf5ea; border-color: #dfc49a; }
  .quiz-card.cello:hover  { background: #faecd5; border-color: var(--cello-color); }
  .quiz-card.bass   { background: #eef4f8; border-color: #9bbfcf; }
  .quiz-card.bass:hover   { background: #daeaf3; border-color: var(--bass-color); }
  .quiz-card-title { font-family: 'Playfair Display', serif; font-size: 1rem; color: var(--navy); margin-bottom: 2px; }
  .quiz-card-desc  { font-size: 0.78rem; color: var(--muted); }
  .quiz-card-arrow { color: var(--muted); font-size: 1.4rem; margin-left: auto; flex-shrink: 0; }
  .quiz-card:hover .quiz-card-arrow { color: var(--navy); }

  /* ── QUIZ BODY ── */
  .body { padding: 28px; }
  .question-label {
    font-size: 0.78rem; font-weight: 600; letter-spacing: 0.1em;
    text-transform: uppercase; color: var(--muted); margin-bottom: 6px;
  }
  .question-text {
    font-family: 'Playfair Display', serif;
    font-size: 1.3rem; color: var(--navy); margin-bottom: 20px;
  }
  .staff-container {
    background: var(--cream);
    border: 2px solid var(--parchment);
    border-radius: 12px;
    padding: 12px;
    display: flex; align-items: center; justify-content: center;
    margin-bottom: 24px; min-height: 210px;
  }
  .staff-img { height: 180px; object-fit: contain; display: block; }

  .answers-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px; margin-bottom: 20px;
  }
  /* 7-option layout (Q1/Q2): 4+3 */
  .answers-grid.opts-7 .answer-btn:nth-child(5) { grid-column: 1; }
  .answers-grid.opts-7 .answer-btn:nth-child(6) { grid-column: 2; }
  .answers-grid.opts-7 .answer-btn:nth-child(7) { grid-column: 3; }
  /* 9-option layout (Q3/Q4): 4 columns, C and F notes paired */
  .answers-grid.opts-9 { grid-template-columns: repeat(4, 1fr); }
  /* Pair cell: two small stacked buttons sharing one grid column */
  .btn-pair {
    display: flex;
    flex-direction: row;
    gap: 5px;
  }
  .btn-pair .answer-btn {
    padding: 14px 2px;
    font-size: 0.78rem;
    flex: 1;
    min-width: 0;
  }

  .answer-btn {
    background: var(--parchment);
    border: 2px solid transparent;
    border-radius: 10px; padding: 14px 8px;
    font-family: 'DM Sans', sans-serif; font-size: 1rem; font-weight: 600;
    color: var(--navy); cursor: pointer; transition: all 0.18s ease; text-align: center;
  }
  .answer-btn:hover:not(:disabled) {
    background: var(--navy); color: white; border-color: var(--navy);
    transform: translateY(-2px); box-shadow: 0 4px 12px rgba(26,39,68,0.2);
  }
  .answer-btn.correct        { background: var(--green); color: white; border-color: var(--green); }
  .answer-btn.wrong          { background: var(--red);   color: white; border-color: var(--red); }
  .answer-btn.reveal-correct { background: var(--green); color: white; border-color: var(--green); opacity: 0.7; }
  .answer-btn:disabled       { cursor: default; transform: none; }

  .feedback {
    min-height: 28px; font-size: 0.9rem; font-weight: 500;
    text-align: center; margin-bottom: 4px;
    transition: font-size 0.15s ease;
  }
  .feedback.correct { color: var(--green); font-size: 1.8rem; font-weight: 700; }
  .feedback.wrong   { color: var(--red);   font-size: 1.8rem; font-weight: 700; }

  .next-btn {
    display: block; width: 100%; padding: 14px;
    background: var(--navy); color: white; border: none; border-radius: 10px;
    font-family: 'DM Sans', sans-serif; font-size: 1rem; font-weight: 600;
    cursor: pointer; transition: background 0.2s, transform 0.15s;
    letter-spacing: 0.03em; margin-top: 16px;
  }
  .next-btn:hover    { background: var(--navy-mid); transform: translateY(-1px); }
  .next-btn:disabled { opacity: 0.4; cursor: default; transform: none; }

  /* ── SCORE SCREEN ── */
  .score-screen { padding: 36px 28px; text-align: center; animation: slideUp 0.4s ease; }
  .score-circle {
    width: 120px; height: 120px; border-radius: 50%; background: var(--navy);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    margin: 0 auto 24px; box-shadow: 0 8px 24px rgba(26,39,68,0.3);
  }
  .score-num   { font-family: 'Playfair Display', serif; font-size: 2.2rem; color: var(--gold-light); line-height: 1; }
  .score-denom { font-size: 0.8rem; color: rgba(255,255,255,0.6); margin-top: 2px; }
  .score-title { font-family: 'Playfair Display', serif; font-size: 1.7rem; color: var(--navy); margin-bottom: 8px; }
  .score-sub   { color: var(--muted); font-size: 0.95rem; margin-bottom: 28px; line-height: 1.5; }
  .results-list {
    text-align: left; background: var(--cream); border-radius: 12px;
    padding: 16px; margin-bottom: 16px; max-height: 240px; overflow-y: auto;
  }
  .result-item {
    display: flex; align-items: center; justify-content: space-between;
    padding: 8px 0; border-bottom: 1px solid var(--parchment); font-size: 0.9rem;
  }
  .result-item:last-child { border-bottom: none; }
  .q-label { color: var(--muted); font-size: 0.8rem; }
  .r-note  { font-weight: 600; color: var(--navy); }
  .r-icon  { font-size: 1rem; }

  .score-btn-row { display: flex; gap: 10px; }
  .score-time { font-size: 0.85rem; color: var(--muted); margin-bottom: 20px; letter-spacing: 0.02em; }
  .replay-btn {
    flex: 1; padding: 14px; background: var(--gold); color: var(--navy);
    border: none; border-radius: 10px; font-family: 'DM Sans', sans-serif;
    font-size: 1rem; font-weight: 700; cursor: pointer; transition: background 0.2s;
  }
  .replay-btn:hover { background: var(--gold-light); }
  .menu-btn {
    flex: 1; padding: 14px; background: var(--parchment); color: var(--navy);
    border: none; border-radius: 10px; font-family: 'DM Sans', sans-serif;
    font-size: 1rem; font-weight: 600; cursor: pointer; transition: background 0.2s;
  }
  .menu-btn:hover { background: #ddd8ce; }
  /* ── SUBMISSION PANEL ── */
  .submit-panel {
    background: var(--cream); border: 2px solid var(--parchment);
    border-radius: 12px; padding: 20px; margin-bottom: 16px; text-align: left;
  }
  .submit-panel-title {
    font-family: 'Playfair Display', serif; font-size: 1rem;
    color: var(--navy); margin-bottom: 14px;
  }
  .submit-field { margin-bottom: 12px; }
  .submit-field label {
    display: block; font-size: 0.78rem; font-weight: 600;
    color: var(--muted); letter-spacing: 0.06em; text-transform: uppercase;
    margin-bottom: 5px;
  }
  .submit-field select,
  .submit-field input[type="text"] {
    width: 100%; padding: 10px 12px;
    border: 2px solid var(--parchment); border-radius: 8px;
    font-family: 'DM Sans', sans-serif; font-size: 0.95rem;
    color: var(--navy); background: white;
    transition: border-color 0.2s; outline: none;
  }
  .submit-field select:focus,
  .submit-field input[type="text"]:focus { border-color: var(--navy); }
  .submit-btn {
    display: block; width: 100%; padding: 14px;
    background: var(--green); color: white; border: none; border-radius: 10px;
    font-family: 'DM Sans', sans-serif; font-size: 1rem; font-weight: 600;
    cursor: pointer; transition: background 0.2s; margin-bottom: 12px;
  }
  .submit-btn:hover:not(:disabled) { background: #236650; }
  .submit-btn:disabled { opacity: 0.5; cursor: default; }
  .submit-status {
    text-align: center; font-size: 0.9rem; font-weight: 600;
    min-height: 22px; margin-bottom: 8px;
  }
  .submit-status.success { color: var(--green); }
  .submit-status.error   { color: var(--red); }
</style>
</head>
<body>
<div class="card" id="app"></div>

<script>
// ── CONFIGURATION ───────────────────────────────────────────────
const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzZG8jEYYdOLcG23rEaYl0CnZgKxfLO2DqcJcj2P9i8QpoQ33f3xLPVUZ_RTFbDtqGP/exec';

// ── MULTI-KEY NOTE POOLS (Quarter 3) ────────────────────────────
// Each entry: { noteFile, noteName (letter only), label }
// Answers are derived at quiz-build time based on the randomly chosen key.

// Key definitions: which notes get sharps
const KEYS = {
  C: { label: 'C Major', sharps: [],           clef: { treble: 'treble0.png', alto: 'alto0.png', bass: 'bass0.png' } },
  G: { label: 'G Major', sharps: ['F'],        clef: { treble: 'treble1.png', alto: 'alto1.png', bass: 'bass1.png' } },
  D: { label: 'D Major', sharps: ['F', 'C'],   clef: { treble: 'treble2.png', alto: 'alto2.png', bass: 'bass2.png' } },
};
const KEY_IDS = ['C', 'G', 'D'];

// Display labels for buttons — adds natural sign to F and C naturals
const DISPLAY_LABEL = { 'F': 'F♮', 'C': 'C♮' };
function displayNote(n) { return DISPLAY_LABEL[n] || n; }

function applyKey(noteName, keyId) {
  // Returns the correct answer string given the base note name and key
  const sharps = KEYS[keyId].sharps;
  if (sharps.includes(noteName)) return noteName + '#';
  return noteName;
}

// Treble clef note pool: note1=G3 on treble, G3-D5 = note1-note12
const TREBLE_POOL = [
  { noteFile: 'note1.png',  noteName: 'G', label: 'G3' },
  { noteFile: 'note2.png',  noteName: 'A', label: 'A3' },
  { noteFile: 'note3.png',  noteName: 'B', label: 'B3' },
  { noteFile: 'note4.png',  noteName: 'C', label: 'C4', excludeInKeys: ['D'] },
  { noteFile: 'note5.png',  noteName: 'D', label: 'D4' },
  { noteFile: 'note6.png',  noteName: 'E', label: 'E4' },
  { noteFile: 'note7.png',  noteName: 'F', label: 'F4' },
  { noteFile: 'note8.png',  noteName: 'G', label: 'G4' },
  { noteFile: 'note9.png',  noteName: 'A', label: 'A4' },
  { noteFile: 'note10.png', noteName: 'B', label: 'B4' },
  { noteFile: 'note11.png', noteName: 'C', label: 'C5' },
  { noteFile: 'note12.png', noteName: 'D', label: 'D5' },
];

// Alto clef note pool: note7=G3 on alto, G3-D5 = note7-note18
const ALTO_POOL = [
  { noteFile: 'note7.png',  noteName: 'G', label: 'G3' },
  { noteFile: 'note8.png',  noteName: 'A', label: 'A3' },
  { noteFile: 'note9.png',  noteName: 'B', label: 'B3' },
  { noteFile: 'note10.png', noteName: 'C', label: 'C4', excludeInKeys: ['D'] },
  { noteFile: 'note11.png', noteName: 'D', label: 'D4' },
  { noteFile: 'note12.png', noteName: 'E', label: 'E4' },
  { noteFile: 'note13.png', noteName: 'F', label: 'F4' },
  { noteFile: 'note14.png', noteName: 'G', label: 'G4' },
  { noteFile: 'note15.png', noteName: 'A', label: 'A4' },
  { noteFile: 'note16.png', noteName: 'B', label: 'B4' },
  { noteFile: 'note17.png', noteName: 'C', label: 'C5' },
  { noteFile: 'note18.png', noteName: 'D', label: 'D5' },
];

// Bass clef note pool: note6=G2 on bass, G2-D4 = note6-note17
// Bass instrument uses same images but labels shifted down an octave
const BASS_POOL = [
  { noteFile: 'note6.png',  noteName: 'G', label: 'G2' },
  { noteFile: 'note7.png',  noteName: 'A', label: 'A2' },
  { noteFile: 'note8.png',  noteName: 'B', label: 'B2' },
  { noteFile: 'note9.png',  noteName: 'C', label: 'C3', excludeInKeys: ['D'] },
  { noteFile: 'note10.png', noteName: 'D', label: 'D3' },
  { noteFile: 'note11.png', noteName: 'E', label: 'E3' },
  { noteFile: 'note12.png', noteName: 'F', label: 'F3' },
  { noteFile: 'note13.png', noteName: 'G', label: 'G3' },
  { noteFile: 'note14.png', noteName: 'A', label: 'A3' },
  { noteFile: 'note15.png', noteName: 'B', label: 'B3' },
  { noteFile: 'note16.png', noteName: 'C', label: 'C4' },
  { noteFile: 'note17.png', noteName: 'D', label: 'D4' },
];

// ── QUARTER 4 NOTE POOLS (expanded ranges) ──────────────────────
// Violin G3-A5: treble note1=G3, A5=note16
const TREBLE_POOL_Q4 = [
  { noteFile: 'note1.png',  noteName: 'G', label: 'G3' },
  { noteFile: 'note2.png',  noteName: 'A', label: 'A3' },
  { noteFile: 'note3.png',  noteName: 'B', label: 'B3' },
  { noteFile: 'note4.png',  noteName: 'C', label: 'C4', excludeInKeys: ['D'] },
  { noteFile: 'note5.png',  noteName: 'D', label: 'D4' },
  { noteFile: 'note6.png',  noteName: 'E', label: 'E4' },
  { noteFile: 'note7.png',  noteName: 'F', label: 'F4' },
  { noteFile: 'note8.png',  noteName: 'G', label: 'G4' },
  { noteFile: 'note9.png',  noteName: 'A', label: 'A4' },
  { noteFile: 'note10.png', noteName: 'B', label: 'B4' },
  { noteFile: 'note11.png', noteName: 'C', label: 'C5' },
  { noteFile: 'note12.png', noteName: 'D', label: 'D5' },
  { noteFile: 'note13.png', noteName: 'E', label: 'E5' },
  { noteFile: 'note14.png', noteName: 'F', label: 'F5' },
  { noteFile: 'note15.png', noteName: 'G', label: 'G5' },
  { noteFile: 'note16.png', noteName: 'A', label: 'A5' },
];

// Viola C3-D5: alto note3=C3, note18=D5
const ALTO_POOL_Q4 = [
  { noteFile: 'note3.png',  noteName: 'C', label: 'C3' },
  { noteFile: 'note4.png',  noteName: 'D', label: 'D3' },
  { noteFile: 'note5.png',  noteName: 'E', label: 'E3' },
  { noteFile: 'note6.png',  noteName: 'F', label: 'F3', excludeInKeys: ['G', 'D'] },
  { noteFile: 'note7.png',  noteName: 'G', label: 'G3' },
  { noteFile: 'note8.png',  noteName: 'A', label: 'A3' },
  { noteFile: 'note9.png',  noteName: 'B', label: 'B3' },
  { noteFile: 'note10.png', noteName: 'C', label: 'C4', excludeInKeys: ['D'] },
  { noteFile: 'note11.png', noteName: 'D', label: 'D4' },
  { noteFile: 'note12.png', noteName: 'E', label: 'E4' },
  { noteFile: 'note13.png', noteName: 'F', label: 'F4' },
  { noteFile: 'note14.png', noteName: 'G', label: 'G4' },
  { noteFile: 'note15.png', noteName: 'A', label: 'A4' },

function buildMultiKeyQuiz(clefType, pool, isBassTransposed, count) {
  // Build all (note × key) combinations, shuffle, take `count`
  count = count || 15;
  const all = [];
  for (const keyId of KEY_IDS) {
    const keyDef = KEYS[keyId];
    const clefImg = keyDef.clef[clefType];
    for (const note of pool) {
      // Skip note+key combinations outside the curriculum scope
      if (note.excludeInKeys && note.excludeInKeys.includes(keyId)) continue;
      const answer = applyKey(note.noteName, keyId);
      // For bass (transposed), shift label down one octave
      let label = note.label;
      if (isBassTransposed) {
        label = label.replace(/\d/, n => String(parseInt(n) - 1));
      }
      all.push({
        noteFile: note.noteFile,
        clefImg,
        clefLabel: keyDef.label,
        keyLabel: keyDef.label,
        answer,
        label,
      });
    }
  }
  // Fisher-Yates shuffle then take 15
  for (let i = all.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [all[i], all[j]] = [all[j], all[i]];
  }
  return all.slice(0, count);
}



// ── FINGERING QUIZ BUILDERS ───────────────────────────────────────
// buildFixedFingeringQuiz: for single-key quarters (Q1, Q2)
// fingerByFile: { 'note5.png': '0', ... }
function buildFixedFingeringQuiz(pool, fingerByFile) {
  const shuffled = [...pool];
  for (let i = shuffled.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
  }
  return shuffled.map(note => ({
    noteFile: note.noteFile,
    answer:   fingerByFile[note.noteFile],
    label:    note.label,
  }));
}

// buildMultiKeyFingeringQuiz: for multi-key quarters (Q3, Q4)
// baseFingerByFile: { 'note5.png': '0', ... } — finger when note is natural/default
// lowTwoFiles: set of noteFiles where noteName is F or C
//   — in those cases: if key has that note sharped → '2', else → 'Low 2'
// lowTwoNoteName: the noteName ('F' or 'C') associated with each lowTwoFile
function buildMultiKeyFingeringQuiz(clefType, pool, baseFingerByFile, lowTwoMap, isBassTransposed, count, lowOneMap, sharpThreeMap, sharpFourMap, sharpShiftMap) {
  // lowTwoMap:    { noteFile: noteLetter } — violin/viola: sharped → '2', natural → 'Low 2'
  // lowOneMap:    { noteFile: noteLetter } — violin: sharped → '1', natural → 'Low 1'
  // sharpThreeMap:{ noteFile: noteLetter } — cello: sharped → '3', natural → '2'
  // sharpFourMap: { noteFile: noteLetter } — bass: sharped → '4', natural → '2'
  // sharpShiftMap:{ noteFile: noteLetter } — bass: sharped → 'Shift 2', natural → 'Shift 1'
  lowTwoMap     = lowTwoMap     || {};
  lowOneMap     = lowOneMap     || {};
  sharpThreeMap = sharpThreeMap || {};
  sharpFourMap  = sharpFourMap  || {};
  sharpShiftMap = sharpShiftMap || {};
  count = count || 15;
  const all = [];
  for (const keyId of KEY_IDS) {
    const keyDef  = KEYS[keyId];
    const clefImg = keyDef.clef[clefType];
    for (const note of pool) {
      // Skip note+key combinations outside the curriculum scope
      if (note.excludeInKeys && note.excludeInKeys.includes(keyId)) continue;
      let finger;
      if (sharpShiftMap.hasOwnProperty(note.noteFile)) {
        const noteLetter = sharpShiftMap[note.noteFile];
        finger = keyDef.sharps.includes(noteLetter) ? 'Shift 2' : 'Shift 1';
      } else if (sharpFourMap.hasOwnProperty(note.noteFile)) {
        const noteLetter = sharpFourMap[note.noteFile];
        finger = keyDef.sharps.includes(noteLetter) ? '4' : '2';
      } else if (sharpThreeMap.hasOwnProperty(note.noteFile)) {
        const noteLetter = sharpThreeMap[note.noteFile];
        finger = keyDef.sharps.includes(noteLetter) ? '3' : '2';
      } else if (lowTwoMap.hasOwnProperty(note.noteFile)) {
        const noteLetter = lowTwoMap[note.noteFile];
        finger = keyDef.sharps.includes(noteLetter) ? '2' : 'Low 2';
      } else if (lowOneMap.hasOwnProperty(note.noteFile)) {
        const noteLetter = lowOneMap[note.noteFile];
        finger = keyDef.sharps.includes(noteLetter) ? '1' : 'Low 1';
      } else {
        finger = baseFingerByFile[note.noteFile];
      }
      let label = note.label;
      if (isBassTransposed) {
        label = label.replace(/\d/, n => String(parseInt(n) - 1));
      }
      all.push({
        noteFile: note.noteFile,
        clefImg,
        clefLabel: keyDef.label,
        keyLabel:  keyDef.label,
        answer:    finger,
        label,
      });
    }
  }
  for (let i = all.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [all[i], all[j]] = [all[j], all[i]];
  }
  return all.slice(0, count);
}

// ── HELPERS ──────────────────────────────────────────────────────
function buildRandomQuiz(pool) {
  // Fisher-Yates shuffle — every note appears exactly once, no repeats
  const shuffled = [...pool];
  for (let i = shuffled.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
  }
  return shuffled;
}

function getMessage(sc, total) {
  const pct = sc / total;
  if (pct === 1)   return "Perfect score! Outstanding musicianship! 🎶";
  if (pct >= 0.75) return "Great work! You're reading notes well.";
  if (pct >= 0.5)  return "Good effort! Keep practicing the staff.";
  return "Keep practicing — you'll get there! 🎵";
}

function formatTime(ms) {
  const totalSec = Math.round(ms / 1000);
  const m = Math.floor(totalSec / 60);
  const s = totalSec % 60;
  if (m === 0) return `${s}s`;
  return `${m}m ${s.toString().padStart(2, '0')}s`;
}

  activeGrade      = grade;
  activeInstrument = INSTRUMENTS.find(i => i.id === instrumentId);
  activeFolder     = null;
  activeQuiz       = null;
  const cc  = activeEnsemble.colorClass;
  const ic  = activeInstrument.colorClass;

  const quarterDefs = [
    { id: 'q1', label: 'Quarter 1' },
    { id: 'q2', label: 'Quarter 2' },
    { id: 'q3', label: 'Quarter 3' },
    { id: 'q4', label: 'Quarter 4' },
  ];

  // Collect all (quarter × quizId) combinations for this instrument
  const quizIds = activeInstrument.quizIds || [instrumentId];

  let cardsHtml = '';
  for (const q of quarterDefs) {
    const key      = quizKey(ensembleId, grade, q.id);
    const folderId = FOLDER_MAP[key];
    const folder   = folderId ? getFolder(folderId) : null;

    for (const qId of quizIds) {
      const quiz  = folder ? folder.quizzes.find(function(qz){ return qz.id === qId; }) : null;
      const ready = !!(folder && quiz);

      // Label: "Quarter 1 – Note Names" or "Quarter 1 – Fingering"
      const isFingerQuiz = qId.includes('fingering');
      const typeLabel    = isFingerQuiz ? 'Fingering' : 'Note Names';
      const cardTitle    = q.label + ' \u2013 ' + typeLabel;

      const clickAttr = ready ? 'onclick="launchQuiz(\'' + folderId + '\',\'' + qId + '\')"' : '';
      const styleAttr = ready ? '' : 'opacity:0.6;cursor:default';
      const desc      = ready ? quiz.desc : 'Coming soon';
      const arrow     = ready ? '\u203a' : '';

      cardsHtml +=
        '<div class="quiz-card ' + ic + '" ' + clickAttr + ' style="' + styleAttr + '">' +
          '<div class="quiz-card-icon" style="font-size:0.72rem;font-weight:700;line-height:1.2;text-align:center;">' +
            q.label.replace('Quarter ','Q') + '<br>' + (isFingerQuiz ? '\uD83C\uDFBB' : '\uD83C\uDFBC') +
          '</div>' +
          '<div>' +

            '<div class="quiz-card-desc">' + desc + '</div>' +
          '</div>' +
          '<div class="quiz-card-arrow">' + arrow + '</div>' +

function buildAnswerButtons(opts) {
  // For 9-option grids, pair C♮/C# and F♮/F# into shared cells
  if (opts.length !== 9) {
    return opts.map(n =>
      `<button class="answer-btn" data-value="${n}" onclick="selectAnswer('${n}', this)">${displayNote(n)}</button>`
    ).join('');
  }
  // Build 7 visual slots: A, B, [C♮+C#], D, E, [F♮+F#], G
  const singles = opts.filter(n => n !== 'C' && n !== 'C#' && n !== 'F' && n !== 'F#');
  // singles = A, B, D, E, G — inject pairs at the right positions
  // Order: A B [C♮/C#] D E [F♮/F#] G
  const slots = ['A', 'B', '__CF__', 'D', 'E', '__FF__', 'G'];
  return slots.map(slot => {
    if (slot === '__CF__') {
      const hasCNat = opts.includes('C'), hasCsh = opts.includes('C#');
      return `<div class="btn-pair">
        ${hasCNat ? `<button class="answer-btn" data-value="C" onclick="selectAnswer('C', this)">${displayNote('C')}</button>` : ''}
        ${hasCsh  ? `<button class="answer-btn" data-value="C#" onclick="selectAnswer('C#', this)">C#</button>` : ''}
      </div>`;
    }
    if (slot === '__FF__') {
      const hasFNat = opts.includes('F'), hasFsh = opts.includes('F#');
      return `<div class="btn-pair">
        ${hasFNat ? `<button class="answer-btn" data-value="F" onclick="selectAnswer('F', this)">${displayNote('F')}</button>` : ''}
        ${hasFsh  ? `<button class="answer-btn" data-value="F#" onclick="selectAnswer('F#', this)">F#</button>` : ''}
      </div>`;
    }
    return `<button class="answer-btn" data-value="${slot}" onclick="selectAnswer('${slot}', this)">${slot}</button>`;
  }).join('');
}

function selectAnswer(chosen, btn) {
  if (answered) return;
  answered = true;

  const q = questions[currentQ];
  const correct = chosen === q.answer;
  if (correct) score++;

  results.push({ label: q.label, keyLabel: q.keyLabel || null, chosen, correct, correctAnswer: q.answer });

  document.querySelectorAll('.answer-btn').forEach(b => {
    b.disabled = true;
    if (b.dataset && b.dataset.value === q.answer && !correct) b.classList.add('reveal-correct');
  });

  if (correct) {
    btn.classList.add('correct');
    document.getElementById('feedback').textContent = '✓ Correct!';
    document.getElementById('feedback').className = 'feedback correct';
  } else {
    btn.classList.add('wrong');
    document.getElementById('feedback').textContent = `✗ The correct answer is ${q.answer}.`;
    document.getElementById('feedback').className = 'feedback wrong';
  }

  setTimeout(nextQuestion, 1000);
}

function nextQuestion() {
  currentQ++;
  answered = false;
  currentQ < totalQ() ? renderQuestion() : renderScore();
}

// ── SCREEN: SCORE ────────────────────────────────────────────────
// Returns note label with accidental applied based on key signature
// e.g. noteWithKey('F4', 'G Major') → 'F#4'
//      noteWithKey('C5', 'D Major') → 'C#5'
//      noteWithKey('B3', 'G Major') → 'B3'
// keyLabel may be a full key name ('D Major') or null — if null, falls back
// to extracting the key from activeQuiz.clefLabel ('Treble Clef · D Major')
function noteWithKey(label, keyLabel) {
  // Resolve key name: use per-question keyLabel, or extract from quiz clefLabel
  let keyName = keyLabel;
  if (!keyName && activeQuiz && activeQuiz.clefLabel) {
    const parts = activeQuiz.clefLabel.split('·');
    keyName = parts[parts.length - 1].trim();
  }
  if (!keyName) return label;
  const keyEntry = Object.values(KEYS).find(k => k.label === keyName);
  if (!keyEntry) return label;
  const match = label.match(/^([A-G])(\d)$/);
  if (!match) return label;
  const noteLetter = match[1];
  const octave     = match[2];
  if (keyEntry.sharps.includes(noteLetter)) {
    return noteLetter + '#' + octave;
  }
  return label;
}

function submitScore() {
  const school    = document.getElementById('school-select').value.trim();
  const firstName = document.getElementById('first-name').value.trim();
  const lastName  = document.getElementById('last-name').value.trim();
  const studentId = document.getElementById('student-id').value.trim();
  const statusEl  = document.getElementById('submit-status');
  const btn       = document.getElementById('submit-btn');

  // Final validation guard
  if (!school || !firstName || !lastName || !/^[0-9]+$/.test(studentId)) {
    statusEl.textContent = 'Please fill in all fields before submitting.';
    statusEl.className = 'submit-status error';
    return;
  }

  btn.disabled = true;
  statusEl.textContent = 'Submitting…';
  statusEl.className = 'submit-status';

  const missedList = results
    .filter(r => !r.correct)
    .map(r => noteWithKey(r.label, r.keyLabel) + (r.keyLabel ? ' (' + r.keyLabel + ')' : ''))
    .join(', ') || 'None';

  const payload = {
    school:     school,
    firstName:  firstName,
    lastName:   lastName,
    studentId:  studentId,
    grade:      activeGrade    || '',
    ensemble:   activeEnsemble ? activeEnsemble.title : '',
    instrument: activeQuiz.title.split(' ')[0],
    quarter:    activeFolder.subtitle,
    score:      score + '/' + totalQ(),
    time:       elapsed,
    missed:     missedList,
  };

  fetch(APPS_SCRIPT_URL, {
    method: 'POST',
    body:   JSON.stringify(payload),
  })
  .then(r => r.json())
  .then(data => {
    if (data.result === 'success') {
      statusEl.textContent = '✓ Score submitted successfully!';
      statusEl.className = 'submit-status success';
      btn.textContent = '✓ Submitted';
    } else {
      throw new Error('Unexpected response');
    }
  })
  .catch(() => {
    statusEl.textContent = '✗ Submission failed. Please try again.';
    statusEl.className = 'submit-status error';
    btn.disabled = false;
  });
}

function renderScore() {
  elapsed = formatTime(Date.now() - quizStartTime);
  document.getElementById('app').innerHTML = `
    <div class="header">
      <h1>
        <span>${activeEnsemble ? activeEnsemble.title + ' · ' : ''}${activeGrade ? activeGrade + ' Grade · ' : ''}${activeFolder.subtitle}</span>
        ${activeQuiz.title}
      </h1>
      <span class="key-badge">${activeQuiz.clefLabel}</span>
    </div>
    <div class="progress-bar-wrap">
      <div class="progress-bar" style="width:100%"></div>
    </div>
    <div class="score-screen">
      <div class="score-circle">
        <div class="score-num">${score}</div>
        <div class="score-denom">out of ${totalQ()}</div>
      </div>
      <div class="score-title">${getMessage(score, totalQ()).split('!')[0]}!</div>
      <div class="score-sub">
        ${score === totalQ()
          ? `Perfect! Every note identified correctly.`
          : `You got ${score} out of ${totalQ()} notes correct.`}
      </div>
      <div class="score-time">⏱ Completed in ${elapsed}</div>

      <div class="results-list">
        ${results.map((r, i) => `
          <div class="result-item">
            <div>
              <div class="q-label">Q${i + 1} · ${noteWithKey(r.label, r.keyLabel)}${r.keyLabel ? ' · ' + r.keyLabel : ''}</div>
              <div class="r-note">${r.correct
                ? r.chosen
                : `You chose: ${r.chosen} &nbsp;→&nbsp; <span style="color:var(--green)">${r.correctAnswer}</span>`
              }</div>
            </div>
            <div class="r-icon">${r.correct ? '✅' : '❌'}</div>
          </div>
        `).join('')}
      </div>

      <div class="submit-panel">
        <div class="submit-panel-title">Submit Your Score</div>
        <div class="submit-field">
          <label for="school-select">School</label>
          <select id="school-select" onchange="checkSubmitReady()">
            <option value="">— Select your school —</option>
            <option value="Bala Cynwyd">Bala Cynwyd</option>
            <option value="Black Rock">Black Rock</option>
            <option value="Welsh Valley">Welsh Valley</option>
          </select>
        </div>
        <div style="display:flex;gap:10px;">
          <div class="submit-field" style="flex:1">
            <label for="first-name">First Name</label>
            <input type="text" id="first-name" maxlength="50" placeholder="First name" oninput="checkSubmitReady()" />
          </div>
          <div class="submit-field" style="flex:1">
            <label for="last-name">Last Name</label>
            <input type="text" id="last-name" maxlength="50" placeholder="Last name" oninput="checkSubmitReady()" />
          </div>
        </div>
        <div class="submit-field">
          <label for="student-id">Student ID <span style="font-weight:400;text-transform:none">(numbers only)</span></label>
          <input type="text" id="student-id" inputmode="numeric" maxlength="10" placeholder="Enter your student ID" oninput="checkSubmitReady()" />
        </div>
        <div class="submit-status" id="submit-status"></div>
        <button class="submit-btn" id="submit-btn" onclick="submitScore()" disabled>📝 Submit Score to Teacher</button>
      </div>

      <div class="score-btn-row">
        <button class="replay-btn" onclick="launchQuiz('${activeFolder.id}', '${activeQuiz.id}')">Try Again</button>
        <button class="menu-btn"   onclick="renderQuarters(activeEnsemble.id, activeGrade, activeInstrument.id)">← Quiz List</button>
      </div>
    </div>
  `;

  // Enforce numbers-only on student ID field
  document.getElementById('student-id').addEventListener('input', function() {
    this.value = this.value.replace(/[^0-9]/g, '');
  });
}

function checkSubmitReady() {
  const school  = document.getElementById('school-select').value.trim();
  const first   = document.getElementById('first-name').value.trim();
  const last    = document.getElementById('last-name').value.trim();
  const id      = document.getElementById('student-id').value.trim();
  const btn     = document.getElementById('submit-btn');
  if (btn) btn.disabled = !(school && first && last && /^[0-9]+$/.test(id));
}

// ── HASH ROUTING ─────────────────────────────────────────────────
function setHash(hash) {
  window._settingHash = true;
  window.location.hash = hash ? '#' + hash : '#';
  setTimeout(function() { window._settingHash = false; }, 50);
}

function navigateToHash(hash) {
  hash = hash.replace(/^#\/?/, '');
  if (!hash) { renderHome(); return; }
  var parts       = hash.split('/');
  var ensembleId  = parts[0];
  var grade       = parts[1];
  var instrumentId= parts[2];
  var quarter     = parts[3];
  var type        = parts[4];

  var ensemble = ENSEMBLES.find(function(e) { return e.id === ensembleId; });
  if (!ensemble) { renderHome(); return; }
  if (!grade) { renderGrade(ensembleId); return; }
  if (!GRADES.includes(grade)) { renderGrade(ensembleId); return; }
  if (!instrumentId) { renderInstrument(ensembleId, grade); return; }
  var instrument = INSTRUMENTS.find(function(i) { return i.id === instrumentId; });
  if (!instrument) { renderInstrument(ensembleId, grade); return; }
  if (!quarter || !type) { renderQuarters(ensembleId, grade, instrumentId); return; }

  var key      = quizKey(ensembleId, grade, quarter);
  var folderId = FOLDER_MAP[key];
  if (!folderId) { renderQuarters(ensembleId, grade, instrumentId); return; }
  var folder = getFolder(folderId);
  if (!folder) { renderQuarters(ensembleId, grade, instrumentId); return; }

  var quizId = (type === 'finger') ? instrumentId + '-fingering' : instrumentId;
  var quiz   = folder.quizzes.find(function(q) { return q.id === quizId; });
  if (!quiz) { renderQuarters(ensembleId, grade, instrumentId); return; }

  activeEnsemble   = ensemble;
  activeGrade      = grade;
  activeInstrument = instrument;
  launchQuiz(folderId, quizId);
}

window.addEventListener('hashchange', function() {
  if (window._settingHash) return;
  navigateToHash(window.location.hash);
});

// ── INIT ─────────────────────────────────────────────────────────
if (window.location.hash && window.location.hash !== '#') {
  navigateToHash(window.location.hash);
} else {
  renderHome();
}
</script>
</body>
</html>
